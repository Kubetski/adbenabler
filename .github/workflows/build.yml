name: Build APK

on:
  push:
    branches: [ main, master ]
    paths:
      - "app/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew

      - name: Build debug APK (auto-signed with debug key)
        run: ./gradlew assembleDebug

      - name: Prepare release files
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/adbenabler.apk
          sha256sum release/adbenabler.apk | cut -d" " -f1 > release/sha256.txt
          echo "=== SHA-256 checksum ==="
          cat release/sha256.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: adbenabler-apk
          path: release/adbenabler.apk

      - name: Upload SHA-256
        uses: actions/upload-artifact@v4
        with:
          name: adbenabler-sha256
          path: release/sha256.txt

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true