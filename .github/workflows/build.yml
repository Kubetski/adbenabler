name: Build APK

on:
  push:
    branches: [ main, master ]
    paths:
      - "app/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle wrapper permission
        run: chmod +x gradlew 2>/dev/null || true

      - name: Generate Gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Sign APK (debug key)
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -alias debug -keyalg RSA -keysize 2048 -validity 365 \
            -storepass android -keypass android \
            -dname "CN=ADB Enabler, O=SamRootKG, C=US"
          java -jar $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks debug.keystore --ks-key-alias debug \
            --ks-pass pass:android --key-pass pass:android \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Rename
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release-unsigned.apk release/adbenabler.apk
          sha256sum release/adbenabler.apk > release/adbenabler.apk.sha256

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: adbenabler-apk
          path: release/adbenabler.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
